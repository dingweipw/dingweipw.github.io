<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三维最小二乘定位 · 小人版 (1000km刻度)</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Microsoft YaHei', sans-serif; }
        #info {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0, 0, 0, 0.8); color: white;
            padding: 15px 25px; border-radius: 8px;
            border-left: 4px solid #4caf50; z-index: 10;
            pointer-events: none; box-shadow: 0 2px 15px rgba(0,0,0,0.5);
        }
        #info h1 { margin: 0 0 5px; font-size: 1.4rem; color: #4caf50; }
        #info p { margin: 5px 0; }
        #controls {
            position: absolute; bottom: 30px; left: 20px; right: 20px;
            background: rgba(30, 30, 30, 0.95); color: white;
            padding: 20px; border-radius: 12px; backdrop-filter: blur(5px);
            border: 1px solid #444; z-index: 20; max-height: 50vh;
            overflow-y: auto; box-shadow: 0 -4px 20px rgba(0,0,0,0.7);
            pointer-events: auto;
        }
        #controls h3 { margin-top: 0; border-bottom: 1px solid #555; padding-bottom: 8px; }
        .beacon-list {
            display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 20px;
            max-height: 300px; overflow-y: auto; padding: 5px;
        }
        .beacon-card {
            background: #3a3a3a; border-radius: 8px; padding: 12px;
            border: 1px solid #555; width: 160px;
        }
        .beacon-card h4 { margin: 0 0 10px; color: #ffaa00; text-align: center; font-size: 1rem; }
        .input-group { display: flex; align-items: center; margin-bottom: 6px; gap: 5px; }
        .input-group label { width: 25px; color: #aaa; font-weight: bold; }
        .input-group input {
            flex: 1; padding: 5px; border-radius: 4px; border: 1px solid #666;
            background: #222; color: white; font-family: monospace; text-align: right;
        }
        .toolbar { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-top: 15px; }
        button {
            background: #4caf50; border: none; color: white;
            padding: 8px 22px; border-radius: 30px; font-size: 1rem;
            font-weight: bold; cursor: pointer; transition: 0.2s; border: 1px solid #66bb6a;
        }
        button:hover { background: #66bb6a; }
        button.remove { background: #d32f2f; border-color: #f44336; }
        .estimation {
            background: #1e3a2e; padding: 8px 20px; border-radius: 30px;
            border: 1px solid #4caf50; font-size: 1.1rem; margin-left: auto;
        }
        .warning { color: #ffaa00; margin-top: 8px; font-size: 0.9rem; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.7.0/math.min.js"></script>
</head>
<body>
    <div id="info">
        <h1>📡 三维最小二乘定位 · 小人版</h1>
        <p>估计坐标 (单位: 1000km): <span id="estX">0.000</span> , <span id="estY">0.000</span> , <span id="estZ">0.000</span></p>
        <p id="message" style="color: #aaf;">⚡ 调整参数，小人实时移动 (1格=1000km)</p>
    </div>

    <div id="controls">
        <h3>🔹 信标节点 (红色小球) 坐标与测量距离 [单位: 1000km]</h3>
        <div class="beacon-list" id="beacon-list"></div>
        <div class="toolbar">
            <button id="addBtn">➕ 添加信标</button>
            <button id="removeBtn" class="remove">➖ 移除最后一个信标</button>
            <div class="estimation">
                🟢 小人 (1000km): (<span id="estX2">0.000</span>, <span id="estY2">0.000</span>, <span id="estZ2">0.000</span>)
            </div>
        </div>
        <div class="warning" id="warningMsg">* 以最后一个信标为参考，避免信标共面。</div>
    </div>

    <script>
        window.onload = function() {
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111122);

            // 摄像机：调整远平面以防在大尺度下裁剪
            const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 5000);
            camera.position.set(30, 40, 50); 
            camera.lookAt(10, 5, 10);

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            const controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.target.set(10, 5, 10);

            // 光照
            scene.add(new THREE.AmbientLight(0x404060));
            const dirLight = new THREE.DirectionalLight(0xffffff, 1);
            dirLight.position.set(20, 40, 10);
            scene.add(dirLight);

            // 辅助网格 (1格=1单位=1000km)
            // 保持 40 个格，每格依然代表 1 个数值单位，只是物理含义变为 1000km
            const gridHelper = new THREE.GridHelper(60, 60, 0x8888ff, 0x333344);
            scene.add(gridHelper);
            const axesHelper = new THREE.AxesHelper(30); 
            scene.add(axesHelper);

            // 星星
            const starsGeometry = new THREE.BufferGeometry();
            const starPositions = new Float32Array(1000 * 3);
            for (let i = 0; i < 1000 * 3; i++) starPositions[i] = (Math.random() - 0.5) * 500;
            starsGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
            scene.add(new THREE.Points(starsGeometry, new THREE.PointsMaterial({color: 0x888888, size: 0.2})));

            // 数据状态
            let beacons = [
                { x: 12.5, y: 8.2, z: 3.7, d: 10.24 },
                { x: 4.3, y: 15.6, z: 9.1, d: 9.87 },
                { x: 7.8, y: 1.4, z: 11.2, d: 11.52 },
                { x: 10.1, y: 13.7, z: 5.9, d: 8.95 },
                { x: 2.6, y: 6.8, z: 14.3, d: 12.31 }
            ];
            let beaconMeshes = [];

            // 小人模型
            function createLittleMan() {
                const group = new THREE.Group();
                const body = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 1.2, 8), new THREE.MeshStandardMaterial({ color: 0x44aa44 }));
                body.position.y = 0.6; group.add(body);
                const head = new THREE.Mesh(new THREE.SphereGeometry(0.4, 16, 16), new THREE.MeshStandardMaterial({ color: 0xffccaa }));
                head.position.y = 1.4; group.add(head);
                // 帽子
                const hat = new THREE.Mesh(new THREE.ConeGeometry(0.35, 0.5, 8), new THREE.MeshStandardMaterial({ color: 0xff5555 }));
                hat.position.y = 1.8; group.add(hat);
                return group;
            }
            const littleMan = createLittleMan();
            // 在 1000km 尺度下，小人缩放微调，使其依然清晰可见
            littleMan.scale.set(0.4, 0.4, 0.4);
            scene.add(littleMan);

            function updateBeaconMeshes() {
                beaconMeshes.forEach(mesh => scene.remove(mesh));
                beaconMeshes = [];
                beacons.forEach((b) => {
                    const sphere = new THREE.Mesh(
                        new THREE.SphereGeometry(0.25, 32, 32), 
                        new THREE.MeshStandardMaterial({ color: 0xff5555, emissive: 0x331111 })
                    );
                    sphere.position.set(b.x, b.y, b.z);
                    scene.add(sphere);
                    beaconMeshes.push(sphere);
                });
            }

            function renderInputs() {
                const container = document.getElementById('beacon-list');
                container.innerHTML = beacons.map((b, i) => `
                    <div class="beacon-card" data-index="${i}">
                        <h4>A${i+1}</h4>
                        <div class="input-group"><label>X</label><input type="number" id="x${i}" step="1" value="${b.x.toFixed(1)}"></div>
                        <div class="input-group"><label>Y</label><input type="number" id="y${i}" step="1" value="${b.y.toFixed(1)}"></div>
                        <div class="input-group"><label>Z</label><input type="number" id="z${i}" step="1" value="${b.z.toFixed(1)}"></div>
                        <div class="input-group"><label>d</label><input type="number" id="d${i}" step="0.1" value="${b.d.toFixed(2)}"></div>
                    </div>
                `).join('');
                attachInputEvents();
            }

            function readInputsToBeacons() {
                beacons.forEach((_, i) => {
                    beacons[i].x = parseFloat(document.getElementById(`x${i}`).value) || 0;
                    beacons[i].y = parseFloat(document.getElementById(`y${i}`).value) || 0;
                    beacons[i].z = parseFloat(document.getElementById(`z${i}`).value) || 0;
                    beacons[i].d = parseFloat(document.getElementById(`d${i}`).value) || 0;
                });
            }

            function computeLeastSquares() {
                const n = beacons.length;
                if (n < 4) return { success: false, message: '三维定位建议至少4个信标以获得稳定解' };
                const ref = beacons[n - 1];
                let A = [], b = [];
                for (let i = 0; i < n-1; i++) {
                    const bi = beacons[i];
                    A.push([ref.x - bi.x, ref.y - bi.y, ref.z - bi.z]);
                    b.push([0.5 * ((ref.x**2 - bi.x**2) + (ref.y**2 - bi.y**2) + (ref.z**2 - bi.z**2) + bi.d**2 - ref.d**2)]);
                }
                try {
                    const X = math.lusolve(math.multiply(math.transpose(math.matrix(A)), math.matrix(A)), math.multiply(math.transpose(math.matrix(A)), math.matrix(b)));
                    return { success: true, coords: [X.get([0,0]), X.get([1,0]), X.get([2,0])] };
                } catch (e) { return { success: false, message: '解算矩阵异常' }; }
            }

            function updateAll() {
                readInputsToBeacons();
                beaconMeshes.forEach((mesh, i) => { if (beacons[i]) mesh.position.set(beacons[i].x, beacons[i].y, beacons[i].z); });
                const result = computeLeastSquares();
                if (result.success) {
                    const [x, y, z] = result.coords;
                    littleMan.position.set(x, y, z);
                    document.getElementById('estX').textContent = document.getElementById('estX2').textContent = x.toFixed(3);
                    document.getElementById('estY').textContent = document.getElementById('estY2').textContent = y.toFixed(3);
                    document.getElementById('estZ').textContent = document.getElementById('estZ2').textContent = z.toFixed(3);
                    document.getElementById('message').innerHTML = '✅ 解算成功';
                    document.getElementById('message').style.color = '#aaffaa';
                } else {
                    document.getElementById('message').innerHTML = '⚠️ ' + result.message;
                    document.getElementById('message').style.color = '#ff6b6b';
                }
            }

            function attachInputEvents() {
                document.querySelectorAll('#beacon-list input').forEach(input => {
                    input.addEventListener('input', () => { updateAll(); });
                });
            }

            document.getElementById('addBtn').addEventListener('click', () => {
                beacons.push({ x: Math.random() * 20, y: Math.random() * 20, z: Math.random() * 20, d: 10 });
                renderInputs(); updateBeaconMeshes(); updateAll();
            });

            document.getElementById('removeBtn').addEventListener('click', () => {
                if (beacons.length > 3) { beacons.pop(); renderInputs(); updateBeaconMeshes(); updateAll(); }
            });

            renderInputs(); updateBeaconMeshes(); updateAll();

            function animate() {
                requestAnimationFrame(animate);
                controls.update();
                renderer.render(scene, camera);
            }
            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        };
    </script>
</body>
</html>
